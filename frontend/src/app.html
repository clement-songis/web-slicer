<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Thème anti-FOUC (T093) : pose data-theme avant le premier rendu, en
		     accord avec le store lib/theme (clé + résolution `system`). -->
		<script>
			try {
				var p = localStorage.getItem('web-slicer.theme');
				var dark =
					p === 'dark' ||
					((p === 'system' || !p) && matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
			} catch (e) {
				/* stockage indisponible : thème clair par défaut (:root) */
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
